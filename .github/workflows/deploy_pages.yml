name: Deploy logs to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy logs to docs
        run: |
          mkdir -p docs
          if [ -d "logs" ]; then
            cp -r logs/* docs/ || true
          else
            echo "No logs folder found; nothing to publish"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
